<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#09080f" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="MOVED" />
<meta name="description" content="MOVED — the anti fitness app. Log workouts, watch the weight add up." />
<title>MOVED — the anti fitness app</title>

<link rel="manifest" href="manifest.json" />
<link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png" />
<link rel="apple-touch-icon" href="icons/icon-180.png" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="app.css" />
</head>
<body>
<div id="app">
  <div class="topline spectrum-bg"></div>
  <header>
    <div class="brand">
      <img class="logo" src="icons/logo-mark.png" alt="MOVED" />
      <div>
        <h1>MOVED</h1>
        <small>anti fitness app</small>
      </div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="icon-btn" id="btn-stats" onclick="go('stats')" aria-label="Analytics">
        <svg viewBox="0 0 24 24"><path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/></svg>
      </button>
      <button class="icon-btn" onclick="openSettings()" aria-label="Settings">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.2 4.2l2.8 2.8M17 17l2.8 2.8M1 12h4M19 12h4M4.2 19.8l2.8-2.8M17 7l2.8-2.8"/></svg>
      </button>
    </div>
  </header>

  <main id="view"></main>

  <nav>
    <button class="nav-btn active" id="nav-home" onclick="go('home')">
      <svg viewBox="0 0 24 24"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9v11h14V9"/></svg>
      <span>Home</span><div class="nav-dot"></div>
    </button>
    <button class="nav-btn" id="nav-workout" onclick="go('workout')">
      <svg viewBox="0 0 24 24"><path d="M6.5 6.5 17.5 17.5M4 9l2-2M20 15l-2 2M7 4l2 2M17 18l-2 2"/><rect x="2.5" y="7" width="3.5" height="10" rx="1"/><rect x="18" y="7" width="3.5" height="10" rx="1"/></svg>
      <span>Workout</span><div class="nav-dot"></div>
    </button>
  </nav>
</div>

<div class="scrim" id="scrim" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-grab"></div>
  <div class="sheet-h"><h3 id="sheet-title"></h3><button class="icon-btn" onclick="closeSheet()" style="width:34px;height:34px"><svg viewBox="0 0 24 24" style="width:18px;height:18px"><path d="M6 6l12 12M18 6 6 18"/></svg></button></div>
  <div class="sheet-body" id="sheet-body"></div>
</div>
<div class="toast" id="toast"></div>
<div class="rest" id="rest">
  <div class="rest-inner">
    <div class="rest-fill" id="rest-fill"></div>
    <span class="rest-label">REST</span>
    <button class="rest-adj" onclick="restAdjust(-15)">−15</button>
    <div class="rest-time mono" id="rest-time">1:30</div>
    <button class="rest-adj" onclick="restAdjust(30)">+30</button>
    <button class="rest-skip spectrum-bg" onclick="restSkip()">Skip</button>
  </div>
</div>
<script src="data/exercises.js"></script>
<script src="data/workout-templates.js"></script>
<script src="app.js"></script>
</body>
</html>
